<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Promoções da Loja</title>
    <!-- <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"> -->
    <link rel="stylesheet" href="./css/bootstrap.min.css">
    <style>
        /* Centralizar o carrossel */
        .carousel-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 20px;
        }
        .carousel-inner img {
            margin: auto;
        }
    </style>
</head>
<body style="background-color: rgb(204, 204, 204);">

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">Meu Site</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link active" href="#">Início</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Ofertas</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Contato</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- ALERTA -->
    <div class="alert alert-info alert-dismissible fade show mx-3 mt-3">
         Bem-vindo ao nosso site! Confira nossas novidades e promoções. :D
         <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- CARROSSEL -->
    <!-- Título -->
    <div class="container mt-4 text-center">
        <h2 class="fw-bold" style="color: rgb(125, 123, 123); font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;">Nossas Melhores Ofertas</h2>
    </div>

    <div class="container mt-3 mb-3">
        <div id="carouselExemplo" class="carousel slide mx-auto" data-bs-ride="carousel">
            <div class="carousel-inner">
                <div class="carousel-item active">
                    <img src="/glases1.jpeg" class="d-block w-100" alt="Slide 1" style="height: 600px; object-fit: contain;">
                </div>

                <div class="carousel-item">
                    <img src="/glases2.jpeg" class="d-block w-100" alt="Slide 2" style="height: 600px; object-fit: contain;">
                </div>

                <div class="carousel-item">
                    <img src="/glases3.jpeg" class="d-block w-100" alt="Slide 3" style="height: 600px; object-fit: contain;">
                </div>

                <button class="carousel-control-prev" type="button" data-bs-target="#carouselExemplo" data-bs-slide="prev">
                    <span class="carousel-control-prev-icon" aria-hidden="true" style="filter: invert(100%);"></span>
                </button>

                <button class="carousel-control-next" type="button" data-bs-target="#carouselExemplo" data-bs-slide="next">
                    <span class="carousel-control-next-icon" aria-hidden="true" style="filter: invert(100%);"></span>
                </button>
            </div>
        </div>
    </div>

    <!-- BARRA DE PROGRESSO -->
    
    <div class="text-center mb-5 mt-5 mx-5" style="color: rgb(125, 123, 123); font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;">
        <h3>🎁 Desbloqueie seu Desconto Extra!</h3>
    </div>
             
    <div class="card p-4 shadow-sm text-center mb-5 mt-5 mx-5">
        <h5>Clique no botão para carregar seu bônus de fidelidade.</h5>
        <div class="progress mb-3" style="height: 30px;">
            <div class="progress-bar progress-bar-striped progress-bar-animated" id="progress-bar" role="progressbar" style="width: 0%;">
                0%
            </div>
        </div>

        <!-- Controles da Progressbar -->
        <div class="btn-group">
            <button class="btn btn-primary" id="increase-progress">+10%</button>
        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.getElementById('increase-progress').addEventListener('click', function() {
        let progressBar = document.getElementById('progress-bar');
        let width = parseInt(progressBar.style.width);
        
        if (width < 100) {
            width += 20;
            progressBar.style.width = width + "%";
            progressBar.textContent = width + "%";

            if (width === 100) {
                alert("🎉 Parabéns! Você desbloqueou um desconto especial!");
            }
        }
    });
</script>

</body>
</html>
