<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Bootstrap</title>
    <!-- CSS do Bootstrap via CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS Personalizado -->
    <link rel="stylesheet" href="style.css">

</head>
<body>


    <!-- 1ª Digitação (Aqui) -->
    <div class="container">
        <div class="row">
            <!-- Linha com quatro colunas -->
            <div class="col-sm-3 bg-primary">Coluna 1</div>
            <div class="col-sm-3 bg-secondary">Coluna 2</div>
            <div class="col-sm-3 bg-danger">Coluna 3</div>
            <div class="col-sm-3 bg-success">Coluna 4</div>  
        </div>

        <!-- Linha com três colunas -->
        <div class="row my-3">
            <div class="col-sm-4 bg-primary">Coluna 1</div>
            <div class="col-sm-4 bg-secondary">Coluna 2</div>
            <div class="col-sm-4 bg-danger">Coluna 3</div>  
        </div>

        <!-- Linha com duas colunas -->
        <div class="row mb-3">
            <div class="col-sm-6 bg-primary">Coluna 1</div>
            <div class="col-sm-6 bg-secondary">Coluna 2</div>
        </div>

        <!-- Linha com colunas diferentes -->
        <div class="row mb-3">
            <!-- Primeira coluna da linha -->
            <div class="bg-custom col-md-7 mb-4">
                <h1>Meu título</h1>
                <p class="fst-italic">Texto responsivo perfeito</p>
            </div>

            <!-- Segunda coluna da linha -->
            <div class="bg-danger col-md-5">
                <img src="https://placehold.co/200x100" alt="">
            </div>
        </div>
    </div>
     

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
